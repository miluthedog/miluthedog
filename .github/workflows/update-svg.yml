name: Update Animated SVG
on:
  push:
    paths:
      - 'image.png'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3 -c '
          import base64, os

          with open("image.png", "rb") as f:
              b64_data = base64.b64encode(f.read()).decode("utf-8")
          
          data_uri = f"data:image/png;base64,{b64_data}"
          
          with open("template.svg", "r") as f:
              content = f.read().replace("IMAGE_DATA_HERE", data_uri)
              
          with open("animated.svg", "w") as f:
              f.write(content)
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add animated.svg
          git commit -m "Auto-update animated.svg with new PNG" || exit 0
          git push