name: Update Animated SVG
on:
  push:
    paths:
      - 'svgImg/image.png'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject PNG into SVG
        run: |
          # 1. Convert PNG to Base64 string
          IMG_B64=$(base64 -w 0 image.png)
          
          # 2. Replace the placeholder in the template
          # We use a temp file to avoid sed reference issues
          sed "s|IMAGE_DATA_HERE|data:image/png;base64,$IMG_B64|g" template.svg > animated.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add animated.svg
          git commit -m "Auto-update animated.svg with new PNG" || exit 0
          git push