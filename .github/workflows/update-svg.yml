name: Update Animated SVG
on:
  push:
    paths:
      - 'svgImg/assets/*.jpg'
      - 'svgImg/assets/*.jpeg'
      - 'svgImg/assets/*.png'
      - 'svgImg/template.svg'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Images into SVG
        run: |
          python3 -c "
          import base64, os
          
          def get_b64(path):
              if not os.path.exists(path):
                  print(f'Warning: {path} not found.')
                  return ''
              ext = os.path.splitext(path)[1].lower()[1:]
              mime = 'jpeg' if ext in ['jpg', 'jpeg'] else 'png'
              with open(path, 'rb') as f:
                  data = base64.b64encode(f.read()).decode('utf-8')
              return f'data:image/{mime};base64,{data}'

          folder = 'svgImg'
          files = {
              'IMAGE_DATA_BG': 'bg.jpg',
              'IMAGE_DATA_1': '1.jpg',
              'IMAGE_DATA_2': '2.jpg',
              'IMAGE_DATA_3': '3.jpg',
              'IMAGE_DATA_4': '4.jpg',
              'IMAGE_DATA_5': '5.jpg'
          }

          template_path = os.path.join(folder, 'template.svg')
          output_path = os.path.join(folder, 'animated.svg')

          if os.path.exists(template_path):
              with open(template_path, 'r') as f:
                  content = f.read()
              for placeholder, filename in files.items():
                  content = content.replace(placeholder, get_b64(os.path.join(folder, filename)))
              with open(output_path, 'w') as f:
                  f.write(content)
          else:
              print('Error: template.svg not found')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add animated.svg
          git commit -m "Auto-update animated.svg with new PNG" || exit 0
          git push