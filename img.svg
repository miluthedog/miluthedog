<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080">
  <style>
    :root {
      --total-duration: 30s; 
    }

    .highlight-image {
      animation: linear-slide var(--total-duration) linear infinite;
    }

    @keyframes linear-slide {
      0% { transform: translateX(-3000px); }
      100% { transform: translateX(3000px); }
    }

    /* Fixed intervals: 30 / 5 = 6s steps */
    .img1 { animation-delay: 0s; }
    .img2 { animation-delay: -6s; }
    .img3 { animation-delay: -12s; }
    .img4 { animation-delay: -18s; }
    .img5 { animation-delay: -24s; }
  </style>

  <image width="1920" height="1080" 
         href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/background.png" 
         xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/background.png" />

  <g>
    <image class="highlight-image img1" y="25%" width="500" height="500" 
           href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/1.jpg" 
           xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/1.jpg" />
           
    <image class="highlight-image img2" y="25%" width="500" height="500" 
           href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/2.jpg" 
           xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/2.jpg" />
           
    <image class="highlight-image img3" y="25%" width="500" height="500" 
           href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/3.jpg" 
           xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/3.jpg" />
           
    <image class="highlight-image img4" y="25%" width="500" height="500" 
           href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/4.jpg" 
           xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/4.jpg" />
           
    <image class="highlight-image img5" y="25%" width="500" height="500" 
           href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/5.jpg" 
           xlink:href="https://raw.githubusercontent.com/miluthedog/miluthedog/main/images/5.jpg" />
  </g>
</svg>